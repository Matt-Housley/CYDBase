; CYDBase - Cheap Yellow Display project
; Environments:
;   desktop  - SDL2 simulation on Mac (default, requires: brew install sdl2)
;   cyd      - ESP32 hardware deployment

[platformio]
default_envs = desktop

[env:desktop]
platform = native
build_type = debug
build_flags =
    -O0 -xc++ -std=c++14
    -DWIDTH=240
    -DHEIGHT=320
    -DLGFX_SDL
    -DDISPLAY_ROTATION=0
    -I/opt/homebrew/include/SDL2
    -L/opt/homebrew/lib
    -I/usr/local/include/SDL2
    -L/usr/local/lib
    -lSDL2
    -lcurl
lib_deps =
    lovyan03/LovyanGFX

[env:cyd]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
build_flags =
    -std=gnu++17
    -DBOARD_CYD
    -DWIDTH=240
    -DHEIGHT=320
    -DDISPLAY_ROTATION=0
lib_deps =
    lovyan03/LovyanGFX
    tzapu/WiFiManager
